name: Generate authorized Rosalia clip

on:
  push:
    branches:
      - main
    paths:
      - "tmp/trigger_rosalia_clip.txt"

permissions:
  contents: write

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download public interview recording
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 4 --retry-delay 3 \
            -A "Mozilla/5.0" \
            -o rosalia_interview_full.mp3 \
            "https://dts.podtrac.com/redirect.mp3/pdst.fm/e/pfx.vpixl.com/6qj4J/pscrb.fm/rss/p/nyt.simplecastaudio.com/9257fd86-22fe-4866-89a9-12c73a57a552/episodes/6372ef52-9e94-41ad-99cc-fa6f74bc757a/audio/128/default.mp3?aid=rss_feed&awCollectionId=9257fd86-22fe-4866-89a9-12c73a57a552&awEpisodeId=6372ef52-9e94-41ad-99cc-fa6f74bc757a&feed=W1rB_kgL"

      - name: Create MP4 clip
        shell: bash
        run: |
          set -euo pipefail
          ffmpeg -y \
            -f lavfi -i "color=c=black:s=1280x720:r=1" \
            -ss 00:05:02 -i rosalia_interview_full.mp3 \
            -t 150 \
            -map 0:v:0 -map 1:a:0 \
            -c:v libx264 -preset veryfast -tune stillimage \
            -c:a aac -b:a 128k -ar 44100 \
            -shortest -movflags +faststart \
            "01_Audios_entrada/rosalia_hablando_2m30.mp4"
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "01_Audios_entrada/rosalia_hablando_2m30.mp4"
          rm -f rosalia_interview_full.mp3

      - name: Commit generated file
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "01_Audios_entrada/rosalia_hablando_2m30.mp4"
          git commit -m "Add authorized Rosalia interview clip [skip ci]"
          git push
